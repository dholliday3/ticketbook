name: Release

# Triggers:
#   - push of a `v*` tag      → full test + build + release pipeline
#   - pull_request (narrow)   → test + build (no release) to validate the
#                               workflow itself when the release-adjacent
#                               files change
#   - workflow_dispatch       → manual dry-run capability; defaults to
#                               dry-run=true so accidental clicks don't
#                               publish anything
on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - '.github/workflows/release.yml'
      - 'scripts/build-binary.sh'
      - 'scripts/generate-embedded-ui.ts'
      - 'bin/relay.ts'
      - 'packages/**'
      - 'package.json'
      - 'bun.lock'
  workflow_dispatch:
    inputs:
      dry-run:
        description: Build binaries without publishing a release
        type: boolean
        default: true

# Default: read-only. The release job widens to contents:write on tag pushes.
permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------------
  # test — typecheck + unit tests + install script tests. Gate for builds.
  # ----------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pinned to 1.3.11 because 1.3.12 regressed darwin cross-compile
          # code signing — the compile step produces a Mach-O binary with
          # no LC_CODE_SIGNATURE load command at all, which AMFI on Apple
          # Silicon rejects with SIGKILL. 1.3.11 produces a properly
          # linker-signed adhoc signature. Bump cautiously; verify against
          # the "Verify darwin signatures" step in build-darwin.
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Run unit tests
        run: bun test

      - name: Run install script tests
        run: bun run test:install

  # ----------------------------------------------------------------------
  # build-linux — cross-compile linux-x64 and linux-arm64 on ubuntu-latest.
  # Bun supports native build + cross-compile for both Linux arches from
  # an x86_64 Linux host.
  # ----------------------------------------------------------------------
  build-linux:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pinned to 1.3.11 because 1.3.12 regressed darwin cross-compile
          # code signing — the compile step produces a Mach-O binary with
          # no LC_CODE_SIGNATURE load command at all, which AMFI on Apple
          # Silicon rejects with SIGKILL. 1.3.11 produces a properly
          # linker-signed adhoc signature. Bump cautiously; verify against
          # the "Verify darwin signatures" step in build-darwin.
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build UI bundle
        run: bun --filter "@relay/ui" build

      - name: Generate embedded-ui.gen.ts
        run: bun run scripts/generate-embedded-ui.ts

      - name: Cross-compile Linux binaries
        run: |
          mkdir -p dist
          for target in bun-linux-x64 bun-linux-arm64; do
            suffix="${target#bun-}"
            outfile="dist/relay-${suffix}"
            echo "==> Compiling $outfile (target: $target)..."
            bun build bin/relay.ts \
              --compile \
              --target="$target" \
              --outfile "$outfile"
            (cd dist && sha256sum "relay-${suffix}" > "relay-${suffix}.sha256")
          done
          echo ""
          echo "==> Built Linux artifacts:"
          ls -lh dist/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: binaries-linux
          path: |
            dist/relay-linux-x64
            dist/relay-linux-x64.sha256
            dist/relay-linux-arm64
            dist/relay-linux-arm64.sha256
          if-no-files-found: error
          retention-days: 14

  # ----------------------------------------------------------------------
  # build-darwin — cross-compile darwin-arm64 and darwin-x64 on
  # macos-latest. Must run on a macOS host (not ubuntu) because Bun's
  # cross-compile from Linux → Darwin produces binaries with no Mach-O
  # code signature at all, and Apple Silicon's AMFI layer kills
  # unsigned binaries with SIGKILL before they can print anything.
  # Building on macOS gives Bun access to `codesign` so it can ad-hoc
  # sign the output, which is the minimum AMFI will accept.
  #
  # Both darwin targets are cross-compiled from a single macos-latest
  # host (currently arm64). Bun supports darwin-arm64 → darwin-x64
  # cross-compile natively, and the resulting binaries are properly
  # signed — verified locally before this workflow change.
  # ----------------------------------------------------------------------
  build-darwin:
    needs: test
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pinned to 1.3.11 because 1.3.12 regressed darwin cross-compile
          # code signing — the compile step produces a Mach-O binary with
          # no LC_CODE_SIGNATURE load command at all, which AMFI on Apple
          # Silicon rejects with SIGKILL. 1.3.11 produces a properly
          # linker-signed adhoc signature. Bump cautiously; verify against
          # the "Verify darwin signatures" step in build-darwin.
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build UI bundle
        run: bun --filter "@relay/ui" build

      - name: Generate embedded-ui.gen.ts
        run: bun run scripts/generate-embedded-ui.ts

      - name: Cross-compile Darwin binaries
        run: |
          mkdir -p dist
          for target in bun-darwin-arm64 bun-darwin-x64; do
            suffix="${target#bun-}"
            outfile="dist/relay-${suffix}"
            echo "==> Compiling $outfile (target: $target)..."
            bun build bin/relay.ts \
              --compile \
              --target="$target" \
              --outfile "$outfile"
            # shasum is BSD; cut -f1 works against both `shasum -a 256`
            # (macOS default) and `sha256sum` (Linux) output formats.
            (cd dist && shasum -a 256 "relay-${suffix}" > "relay-${suffix}.sha256")
          done
          echo ""
          echo "==> Built Darwin artifacts:"
          ls -lh dist/

      - name: Verify darwin signatures
        # Hard failure if either darwin binary is missing its ad-hoc
        # signature. Catches Bun regressions in cross-compile signing
        # (see bun-version pin comment above — 1.3.12 had this bug).
        # Without this step, an unsigned darwin binary passes build,
        # uploads to the release, and only surfaces as SIGKILL the
        # first time a user actually runs it.
        run: |
          for binary in dist/relay-darwin-arm64 dist/relay-darwin-x64; do
            echo "==> $binary"
            if codesign -dvvv "$binary" 2>&1 | grep -q "code object is not signed at all"; then
              echo "ERROR: $binary is unsigned — AMFI will kill it on Apple Silicon."
              echo "This is usually a Bun version regression. See the bun-version pin"
              echo "comment in .github/workflows/release.yml."
              exit 1
            fi
            codesign -dvvv "$binary" 2>&1 | head -5
            echo ""
          done
          echo "==> Smoke-testing darwin-arm64 binary (--help must exit 0)..."
          dist/relay-darwin-arm64 --help >/dev/null
          echo "✓ darwin-arm64 runs"

      - name: Upload Darwin artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: binaries-darwin
          path: |
            dist/relay-darwin-arm64
            dist/relay-darwin-arm64.sha256
            dist/relay-darwin-x64
            dist/relay-darwin-x64.sha256
          if-no-files-found: error
          retention-days: 14

  # ----------------------------------------------------------------------
  # release — download Linux + Darwin artifacts, publish a GitHub Release.
  # Tag pushes only. Pre-release flag is auto-set for tags that contain
  # a hyphen (v0.1.0-rc.1 is a pre-release; v0.1.0 is not).
  # ----------------------------------------------------------------------
  release:
    needs: [build-linux, build-darwin]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Linux artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries-linux
          path: artifacts

      - name: Download Darwin artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries-darwin
          path: artifacts

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
